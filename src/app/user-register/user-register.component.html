<div class="register-container">
    <div>
        <form [formGroup] ="user_register_dtls" class="login_form" (ngSubmit)="UserRegister()">
            <label for ='username'>USER NAME </label><span style="color: red;">*</span><br><br>
        <input placeholder="username" id="name" type ="text" formControlName="username"><br><br>
        <label for ='Email'>Email </label><br><br>
        <input placeholder="email" id="email" type ="text" formControlName="email"><br><br>
        <label for ='Password'>Password </label><br><br>
        <input placeholder="Password" id="password" type ="text" formControlName="password"><br><br>
        <span class="lonig_sub_btn">
            <button>Submit</button>&nbsp;
        </span>
        </form>
    </div>
</div>
